kind = "web"
previewPath = "/"
title = "Agent & Device Management System"
version = "1.0.0"
id = "artifacts/adms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20602

[services.development]
run = "pnpm --filter @workspace/adms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adms", "run", "build" ]
publicDir = "artifacts/adms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20602"
BASE_PATH = "/"
